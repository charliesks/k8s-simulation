server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Mirror vercel.json rewrite: /draw -> /draw.html
  location = /draw {
    rewrite ^ /draw.html break;
  }

  # Serve static files. If a path doesn't exist, show the main menu.
  # This keeps links like "/" working, and also avoids hard 404s for
  # client-side routes (even though this app is mostly static pages).
  location / {
    try_files $uri $uri/ /index.html;
  }
}

